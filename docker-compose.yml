version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: health_copilot_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-health_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-health_pass}
      POSTGRES_DB: ${POSTGRES_DB:-health_copilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-health_user} -d ${POSTGRES_DB:-health_copilot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_copilot_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-health_user}:${POSTGRES_PASSWORD:-health_pass}@db:5432/${POSTGRES_DB:-health_copilot}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health_copilot_web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
